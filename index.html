<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }
  #gameCanvas { display: block; width: 100vw; height: 100vh; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: flex; flex-direction: column;
  }
  #topBar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 32px; pointer-events: none;
  }
  #controls {
    display: flex;
    gap: 8px;
    pointer-events: all;
  }
  .ui-btn {
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.75);
    color: #111;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: all;
    transition: transform 0.15s, opacity 0.2s, background 0.4s, color 0.4s, border-color 0.4s;
  }
  .ui-btn:hover { transform: translateY(-1px); }
  .ui-btn:active { transform: scale(0.98); }
  .ui-btn.off { opacity: 0.55; }
  #logo {
    font-size: 22px; font-weight: 700; letter-spacing: -1px;
    opacity: 0.9; transition: color 0.8s;
  }
  #scoreArea { text-align: right; }
  #score { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; transition: color 0.8s; }
  #scoreLabel { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.5; transition: color 0.8s; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: all; transition: background 0.8s; z-index: 100;
  }
  #overlay.hidden { display: none; }
  .card {
    padding: 40px 48px; border-radius: 20px;
    text-align: center; max-width: 320px; width: 90%;
    transition: background 0.8s, border-color 0.8s;
  }
  .card h1 { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; }
  .card .tagline { font-size: 14px; opacity: 0.55; letter-spacing: 0.5px; margin-bottom: 32px; }
  .card .final-score { font-size: 56px; font-weight: 800; letter-spacing: -2px; margin: 16px 0; }
  .card .score-breakdown { font-size: 13px; opacity: 0.6; margin-bottom: 24px; }
  #startBtn, #restartBtn {
    padding: 14px 36px; border-radius: 100px; border: none;
    font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
    cursor: pointer; pointer-events: all;
    transition: transform 0.15s, background 0.8s, color 0.8s;
  }
  #shareBtn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 100px;
    border: 1px solid rgba(0, 0, 0, 0.2);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: all;
    background: transparent;
  }
  #startBtn:hover, #restartBtn:hover { transform: scale(1.04); }
  #startBtn:active, #restartBtn:active { transform: scale(0.97); }
  #hint { font-size: 12px; opacity: 0.4; margin-top: 14px; letter-spacing: 0.5px; }
  #bestScoreText {
    font-size: 12px;
    opacity: 0.6;
    margin-top: -6px;
    margin-bottom: 14px;
    letter-spacing: 0.4px;
  }
  #shareStatus {
    min-height: 16px;
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 0.3px;
    opacity: 0.65;
  }
  #statsPanel {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.45;
    opacity: 0.7;
    display: none;
  }
  #unlockText {
    min-height: 16px;
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 0.3px;
    opacity: 0.65;
  }
  #levelBadge {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 16px; border-radius: 100px; opacity: 0; pointer-events: none;
    transition: opacity 0.4s, background 0.8s, color 0.8s;
  }
  #levelBadge.show { opacity: 0.7; }
  #contextHint {
    position: fixed;
    left: 50%;
    bottom: 72px;
    transform: translateX(-50%);
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }
  #contextHint.show {
    opacity: 0.85;
    transform: translateX(-50%) translateY(-2px);
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="topBar">
    <div id="logo">flip</div>
    <div id="controls">
      <button class="ui-btn" id="pauseBtn">pause</button>
      <button class="ui-btn" id="muteBtn">sound on</button>
      <button class="ui-btn off" id="debugBtn">hitbox off</button>
    </div>
    <div id="scoreArea">
      <div id="score">0</div>
      <div id="scoreLabel">score</div>
    </div>
  </div>
</div>
<div id="levelBadge"></div>
<div id="contextHint"></div>
<div id="overlay">
  <div class="card" id="menuCard">
    <h1 id="overlayTitle">flip</h1>
    <div class="tagline" id="overlayTagline">dodge spikes. collect coins. survive.</div>
    <div class="final-score" id="finalScore" style="display:none"></div>
    <div id="bestScoreText"></div>
    <div class="score-breakdown" id="scoreBreakdown" style="display:none"></div>
    <div id="statsPanel"></div>
    <button id="startBtn">play</button>
    <button id="shareBtn" style="display:none">share score</button>
    <div id="shareStatus"></div>
    <div id="unlockText"></div>
    <div id="hint">space or tap to flip</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const overlayEl = document.getElementById('overlay');
const menuCardEl = document.getElementById('menuCard');
const startBtnEl = document.getElementById('startBtn');
const pauseBtnEl = document.getElementById('pauseBtn');
const muteBtnEl = document.getElementById('muteBtn');
const debugBtnEl = document.getElementById('debugBtn');
const shareBtnEl = document.getElementById('shareBtn');
const contextHintEl = document.getElementById('contextHint');

const STORAGE_KEYS = {
  bestScore: 'flip.bestScore',
  bestRunMs: 'flip.bestRunMs',
  unlockTier: 'flip.unlockTier',
  mutedSession: 'flip.muted'
};

const unlockMilestones = [0, 45, 90, 150];
const variants = [
  { name: 'classic', fill: null, trail: null, border: null },
  { name: 'skyline', fill: '#42b6ff', trail: '#80d4ff', border: '#0c5f85' },
  { name: 'citrus', fill: '#f8c43f', trail: '#ffe08a', border: '#a36b00' },
  { name: 'pulse', fill: '#ff5a7d', trail: '#ff94a9', border: '#7f1230' }
];

const themes = [
  { name: 'clean', bg: '#ffffff', fg: '#111111', line: '#e0e0e0', accent: '#111111', card: '#f5f5f5', cardText: '#111111', btn: '#111111', btnText: '#ffffff', badge: '#111111', badgeText: '#ffffff' },
  { name: 'dusk', bg: '#1a1a2e', fg: '#e0e0ff', line: '#2a2a4e', accent: '#7c7cff', card: '#16213e', cardText: '#e0e0ff', btn: '#7c7cff', btnText: '#ffffff', badge: '#7c7cff', badgeText: '#fff' },
  { name: 'ember', bg: '#1a0a00', fg: '#ff6b2b', line: '#2a1500', accent: '#ff6b2b', card: '#1a0a00', cardText: '#ff9955', btn: '#ff6b2b', btnText: '#fff', badge: '#ff6b2b', badgeText: '#fff' },
  { name: 'abyss', bg: '#020010', fg: '#00ffcc', line: '#0a0030', accent: '#00ffcc', card: '#050020', cardText: '#00ffcc', btn: '#00ffcc', btnText: '#020010', badge: '#00ffcc', badgeText: '#020010' },
  { name: 'void', bg: '#000000', fg: '#ff2255', line: '#1a0010', accent: '#ff2255', card: '#0a0008', cardText: '#ff4477', btn: '#ff2255', btnText: '#fff', badge: '#ff2255', badgeText: '#fff' }
];

const levelNames = ['', 'dusk', 'ember', 'abyss', 'void'];

const PLAYER_SIZE = 22;
const PLAYER_GAP = 6;
const LINE_THICKNESS = 2;
const COIN_BOB_AMPLITUDE = 2.5;
const PLAYER_COLLISION_MARGIN = 4;
const SPIKE_COLLISION_MARGIN = 5;

let W, H, midY;
let currentTheme = { ...themes[0] };
let targetTheme = { ...themes[0] };
let themeProgress = 1;

let state = 'menu';
let score = 0;
let spikesAvoided = 0;
let coinsCollected = 0;
let runElapsedMs = 0;

let bestScore = Number(localStorage.getItem(STORAGE_KEYS.bestScore) || 0);
let bestRunMs = Number(localStorage.getItem(STORAGE_KEYS.bestRunMs) || 0);
let unlockedTier = Number(localStorage.getItem(STORAGE_KEYS.unlockTier) || 0);
if (!Number.isFinite(unlockedTier) || unlockedTier < 0) unlockedTier = 0;
unlockedTier = Math.min(unlockedTier, variants.length - 1);

let player;
let obstacles;
let coins;
let powerups;
let particles;
let floatTexts;

let gameTime = 0;
let lastSpike = 0;
let nextCoinTime = 300;
let nextPowerupTime = 1700;
let level = 0;
let lastLevel = -1;

let lastSpikeSide = null;
let consecutiveSideCount = 0;
let firstCoinHintShown = false;
let firstCoinCollected = false;
let firstDodgeHintShown = false;

let debugHitboxes = false;
let shieldActive = false;
let shieldTimer = 0;
let slowMoTimer = 0;

let hintTimer;
let animFrame;
let lastTime = 0;

let audioCtx = null;
let muted = sessionStorage.getItem(STORAGE_KEYS.mutedSession) === '1';

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  midY = H / 2;
}
resize();
window.addEventListener('resize', resize);

function lerp(a, b, t) { return a + (b - a) * t; }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}
function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1);
  const b = hexToRgb(c2);
  return `rgb(${Math.round(lerp(a[0], b[0], t))},${Math.round(lerp(a[1], b[1], t))},${Math.round(lerp(a[2], b[2], t))})`;
}
function getThemeColor(key) {
  if (themeProgress >= 1) return targetTheme[key] ?? currentTheme[key];
  return lerpColor(currentTheme[key], targetTheme[key], themeProgress);
}
function getInterpolatedTheme() {
  if (themeProgress >= 1) return { ...targetTheme };
  const t = {};
  for (const key of Object.keys(currentTheme)) t[key] = getThemeColor(key);
  return t;
}

function getActiveVariant() {
  return variants[Math.min(unlockedTier, variants.length - 1)];
}

function getTrackCenterY(side) {
  return side === 'top'
    ? midY - PLAYER_GAP - PLAYER_SIZE / 2
    : midY + PLAYER_GAP + PLAYER_SIZE / 2;
}

function getCoinY(coin, t) {
  const bob = Math.sin(t * 0.04 + coin.bobOffset) * COIN_BOB_AMPLITUDE;
  return getTrackCenterY(coin.side) + bob;
}

function showContextHint(text, duration = 1700) {
  contextHintEl.textContent = text;
  contextHintEl.style.background = getThemeColor('card');
  contextHintEl.style.color = getThemeColor('cardText');
  contextHintEl.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => contextHintEl.classList.remove('show'), duration);
}

function ensureAudio() {
  if (!audioCtx) {
    const AudioContextRef = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextRef) return null;
    audioCtx = new AudioContextRef();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freq, duration, type, volume = 0.04, slideTo = null) {
  if (muted) return;
  const ac = ensureAudio();
  if (!ac) return;
  const now = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), now + duration);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(now);
  osc.stop(now + duration + 0.02);
}

function playSfx(name) {
  if (name === 'flip') {
    tone(420, 0.07, 'square', 0.03, 620);
  } else if (name === 'coin') {
    tone(730, 0.08, 'triangle', 0.05, 980);
  } else if (name === 'death') {
    tone(280, 0.28, 'sawtooth', 0.05, 70);
  } else if (name === 'shield') {
    tone(500, 0.1, 'triangle', 0.045, 800);
  } else if (name === 'shieldBreak') {
    tone(760, 0.08, 'square', 0.04, 300);
  }
}

function updateMuteButton() {
  muteBtnEl.textContent = muted ? 'sound off' : 'sound on';
  muteBtnEl.classList.toggle('off', muted);
}

function updatePauseButton() {
  if (state === 'paused') {
    pauseBtnEl.textContent = 'resume';
    pauseBtnEl.classList.remove('off');
  } else {
    pauseBtnEl.textContent = 'pause';
    pauseBtnEl.classList.toggle('off', state !== 'playing');
  }
}

function updateDebugButton() {
  debugBtnEl.textContent = debugHitboxes ? 'hitbox on' : 'hitbox off';
  debugBtnEl.classList.toggle('off', !debugHitboxes);
}

function updateBestLabel() {
  const bestEl = document.getElementById('bestScoreText');
  bestEl.textContent = `best ${bestScore} • style ${getActiveVariant().name}`;
}

function updateUI() {
  document.getElementById('score').textContent = score;
  updateBestLabel();
}

function getSpeed() {
  const baseRamp = 3.2 + Math.min(gameTime / 600, 1) * 4.3;
  const stageRamp = Math.floor(gameTime / 1400) * 0.82;
  const endlessRamp = Math.max(0, gameTime - 3400) / 2400 * 1.1;
  const capped = Math.min(10.3, baseRamp + stageRamp + endlessRamp);
  return slowMoTimer > 0 ? capped * 0.62 : capped;
}

function getSpawnInterval() {
  const earlyRamp = 124 - Math.min(gameTime / 36, 60);
  const lateRamp = Math.max(0, gameTime - 2400) / 180;
  return Math.max(54, earlyRamp - lateRamp);
}

function getFollowupChance() {
  if (gameTime < 2600) return 0;
  return Math.min(0.32, 0.1 + (gameTime - 2600) / 8500);
}

function getFollowupGap() {
  const minGap = Math.max(108, 210 - gameTime / 45);
  const maxGap = Math.max(minGap + 34, 278 - gameTime / 36);
  return minGap + Math.random() * (maxGap - minGap);
}

function getMaxActiveSpikes() {
  if (gameTime < 1400) return 3;
  if (gameTime < 3000) return 4;
  if (gameTime < 5200) return 5;
  return 6;
}

function getLevel() {
  if (gameTime < 600) return 0;
  if (gameTime < 1500) return 1;
  if (gameTime < 3000) return 2;
  if (gameTime < 5000) return 3;
  return 4;
}

function initGame() {
  player = {
    y: midY - PLAYER_GAP - PLAYER_SIZE,
    side: 'top',
    flipping: false,
    squish: 1,
    trail: []
  };
  obstacles = [];
  coins = [];
  powerups = [];
  particles = [];
  floatTexts = [];

  score = 0;
  spikesAvoided = 0;
  coinsCollected = 0;
  runElapsedMs = 0;
  gameTime = 0;
  lastSpike = 0;
  nextCoinTime = 260;
  nextPowerupTime = 1850;
  level = 0;
  lastLevel = -1;
  lastSpikeSide = null;
  consecutiveSideCount = 0;

  shieldActive = false;
  shieldTimer = 0;
  slowMoTimer = 0;
  firstCoinHintShown = false;
  firstCoinCollected = false;
  firstDodgeHintShown = false;

  themeProgress = 1;
  currentTheme = { ...themes[0] };
  targetTheme = { ...themes[0] };

  document.getElementById('shareStatus').textContent = '';
  document.getElementById('unlockText').textContent = '';
  updateUI();
}

function doFlip() {
  if (state !== 'playing') return;
  ensureAudio();
  player.side = player.side === 'top' ? 'bottom' : 'top';
  player.flipping = true;
  player.squish = 0.58;
  playSfx('flip');
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3;
    particles.push({
      x: W * 0.18,
      y: midY,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      size: 3 + Math.random() * 3,
      color: getThemeColor('accent')
    });
  }
}

function addSpike(side, xOffset = 30) {
  const hScale = 1 + Math.min(gameTime / 5500, 1) * 0.24;
  const wScale = 1 + Math.min(gameTime / 7000, 1) * 0.18;
  const spikeH = (30 + Math.random() * 14) * hScale;
  const spikeW = (18 + Math.random() * 10) * wScale;
  obstacles.push({ x: W + xOffset, side, spikeH, spikeW, scored: false });
}

function spawnSpike() {
  if (obstacles.length >= getMaxActiveSpikes()) return;

  let side;
  if (consecutiveSideCount >= 2) {
    side = lastSpikeSide === 'top' ? 'bottom' : 'top';
  } else {
    side = Math.random() < 0.5 ? 'top' : 'bottom';
  }

  if (side === lastSpikeSide) {
    consecutiveSideCount += 1;
  } else {
    consecutiveSideCount = 1;
    lastSpikeSide = side;
  }

  addSpike(side, 30);

  if (Math.random() < getFollowupChance() && obstacles.length < getMaxActiveSpikes()) {
    const followSide = side === 'top' ? 'bottom' : 'top';
    addSpike(followSide, 30 + getFollowupGap());
    lastSpikeSide = followSide;
    consecutiveSideCount = 1;
  }
}

function spawnCoin() {
  const side = Math.random() < 0.5 ? 'top' : 'bottom';
  coins.push({
    x: W + 20,
    side,
    collected: false,
    bobOffset: Math.random() * Math.PI * 2,
    scale: 0,
    scaleTarget: 1
  });
  if (!firstCoinHintShown) {
    firstCoinHintShown = true;
    showContextHint('grab coins for +3');
  }
}

function spawnPowerup() {
  if (gameTime < 1800 || powerups.length > 0) return;
  if (Math.random() > 0.26) return;
  const side = Math.random() < 0.5 ? 'top' : 'bottom';
  const type = Math.random() < 0.7 ? 'shield' : 'slow';
  powerups.push({
    x: W + 20,
    side,
    type,
    collected: false,
    bobOffset: Math.random() * Math.PI * 2,
    scale: 0,
    scaleTarget: 1
  });
}

function drawSpike(x, side, spikeW, spikeH, color) {
  const baseY = midY + (side === 'top' ? -LINE_THICKNESS / 2 : LINE_THICKNESS / 2);
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  if (side === 'top') {
    ctx.moveTo(x - spikeW / 2, baseY);
    ctx.lineTo(x, baseY - spikeH);
    ctx.lineTo(x + spikeW / 2, baseY);
  } else {
    ctx.moveTo(x - spikeW / 2, baseY);
    ctx.lineTo(x, baseY + spikeH);
    ctx.lineTo(x + spikeW / 2, baseY);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPlayer(freeze = false) {
  const px = W * 0.18;
  const targetY = player.side === 'top' ? midY - PLAYER_GAP - PLAYER_SIZE : midY + PLAYER_GAP;

  if (!freeze) {
    if (player.flipping) {
      player.y = lerp(player.y, targetY, 0.25);
      if (Math.abs(player.y - targetY) < 0.5) {
        player.y = targetY;
        player.flipping = false;
      }
    } else {
      player.y = lerp(player.y, targetY, 0.3);
    }
    player.squish = lerp(player.squish, 1, 0.18);
  }

  const centerX = px;
  const centerY = player.y + PLAYER_SIZE / 2;

  if (!freeze) {
    player.trail.unshift({ x: centerX, y: centerY });
    if (player.trail.length > 10) player.trail.pop();
  }

  const activeVariant = getActiveVariant();
  const fgColor = activeVariant.fill || getThemeColor('fg');
  const accentColor = activeVariant.trail || getThemeColor('accent');

  for (let i = 1; i < player.trail.length; i++) {
    const alpha = (1 - i / player.trail.length) * 0.18;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = accentColor;
    const ts = PLAYER_SIZE * (1 - i / player.trail.length) * player.squish;
    const tx = player.trail[i].x - ts / 2;
    const ty = player.trail[i].y - ts / 2;
    const radius = 4 * (1 - i / player.trail.length);
    ctx.beginPath();
    ctx.roundRect(tx, ty, ts, ts, radius);
    ctx.fill();
    ctx.restore();
  }

  const sx = player.squish;
  const sy = 2 - player.squish;
  const rw = PLAYER_SIZE * sx;
  const rh = PLAYER_SIZE * sy;
  ctx.save();
  ctx.fillStyle = fgColor;
  ctx.beginPath();
  ctx.roundRect(centerX - rw / 2, centerY - rh / 2, rw, rh, 5);
  ctx.fill();
  if (activeVariant.border) {
    ctx.lineWidth = 2;
    ctx.strokeStyle = activeVariant.border;
    ctx.stroke();
  }
  if (shieldActive) {
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = getThemeColor('accent');
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(centerX, centerY, PLAYER_SIZE * 0.95, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCoin(coin, t, freeze = false) {
  const fgColor = getThemeColor('fg');
  const cy = getCoinY(coin, t);
  if (!freeze) coin.scale = lerp(coin.scale, coin.scaleTarget, 0.15);
  const s = coin.scale * 9;
  ctx.save();
  ctx.globalAlpha = coin.scale;
  ctx.strokeStyle = fgColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(coin.x, cy, s, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = fgColor;
  ctx.beginPath();
  ctx.arc(coin.x, cy, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  coin._cy = cy;
}

function drawPowerup(powerup, t, freeze = false) {
  const cy = getCoinY(powerup, t);
  if (!freeze) powerup.scale = lerp(powerup.scale, powerup.scaleTarget, 0.16);
  const s = powerup.scale * 10;
  const color = powerup.type === 'shield' ? '#5ae1ff' : '#b6ff6a';
  ctx.save();
  ctx.globalAlpha = powerup.scale;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(powerup.x, cy - s);
  ctx.lineTo(powerup.x + s, cy);
  ctx.lineTo(powerup.x, cy + s);
  ctx.lineTo(powerup.x - s, cy);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
  powerup._cy = cy;
}

function getPlayerBounds() {
  const px = W * 0.18;
  return {
    left: px - PLAYER_SIZE / 2 - PLAYER_COLLISION_MARGIN,
    right: px + PLAYER_SIZE / 2 + PLAYER_COLLISION_MARGIN,
    top: player.y + PLAYER_COLLISION_MARGIN,
    bottom: player.y + PLAYER_SIZE - PLAYER_COLLISION_MARGIN
  };
}

function checkSpikeCollision(obs, bounds) {
  const ox = obs.x;
  const ow = obs.spikeW;
  const oh = obs.spikeH;
  if (ox + ow / 2 < bounds.left || ox - ow / 2 > bounds.right) return false;
  if (obs.side === 'top') {
    return bounds.top < midY && bounds.bottom > midY - oh + SPIKE_COLLISION_MARGIN;
  }
  return bounds.bottom > midY && bounds.top < midY + oh - SPIKE_COLLISION_MARGIN;
}

function checkCollisions() {
  const bounds = getPlayerBounds();
  for (const obs of obstacles) {
    if (checkSpikeCollision(obs, bounds)) return obs;
  }
  return null;
}

function consumeShield(hitObs) {
  shieldActive = false;
  shieldTimer = 0;
  playSfx('shieldBreak');
  particles.push({ x: hitObs.x, y: midY, vx: -2.2, vy: 0, life: 1, size: 9, color: '#5ae1ff' });
  obstacles = obstacles.filter(o => o !== hitObs);
}

function updateUnlocks() {
  let newTier = unlockedTier;
  for (let i = unlockMilestones.length - 1; i >= 0; i--) {
    if (score >= unlockMilestones[i]) {
      newTier = Math.max(newTier, i);
      break;
    }
  }
  if (newTier > unlockedTier) {
    unlockedTier = Math.min(newTier, variants.length - 1);
    localStorage.setItem(STORAGE_KEYS.unlockTier, String(unlockedTier));
    document.getElementById('unlockText').textContent = `unlocked style: ${getActiveVariant().name}`;
  }
}

function resetOverlayForRun() {
  document.getElementById('overlayTitle').textContent = 'flip';
  document.getElementById('overlayTitle').style.fontSize = '48px';
  document.getElementById('overlayTagline').textContent = 'dodge spikes. collect coins. survive.';
  document.getElementById('finalScore').style.display = 'none';
  document.getElementById('scoreBreakdown').style.display = 'none';
  document.getElementById('statsPanel').style.display = 'none';
  startBtnEl.style.display = 'inline-block';
  document.getElementById('restartBtn').style.display = 'none';
  shareBtnEl.style.display = 'none';
  document.getElementById('shareStatus').textContent = '';
  updateBestLabel();
}

function formatDuration(ms) {
  return `${(ms / 1000).toFixed(1)}s`;
}

function setPaused(paused) {
  if (paused && state === 'playing') {
    state = 'paused';
    showContextHint('paused');
  } else if (!paused && state === 'paused') {
    state = 'playing';
    showContextHint('resume');
  }
  updatePauseButton();
}

function togglePause() {
  if (state === 'playing') setPaused(true);
  else if (state === 'paused') setPaused(false);
}

function startGame() {
  ensureAudio();
  resetOverlayForRun();
  overlayEl.classList.add('hidden');
  initGame();
  state = 'playing';
  updatePauseButton();
}

function die() {
  state = 'dead';
  playSfx('death');
  const px = W * 0.18;
  const py = player.y + PLAYER_SIZE / 2;
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x: px,
      y: py,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1,
      size: 4 + Math.random() * 4,
      color: getThemeColor('accent')
    });
  }

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem(STORAGE_KEYS.bestScore, String(bestScore));
  }
  if (runElapsedMs > bestRunMs) {
    bestRunMs = runElapsedMs;
    localStorage.setItem(STORAGE_KEYS.bestRunMs, String(bestRunMs));
  }
  updateUnlocks();

  setTimeout(() => {
    const t = themes[Math.min(level, themes.length - 1)];
    overlayEl.style.background = `${t.bg}ee`;
    menuCardEl.style.background = t.card;
    menuCardEl.style.color = t.cardText;

    document.getElementById('overlayTitle').textContent = 'game over';
    document.getElementById('overlayTitle').style.fontSize = '36px';
    document.getElementById('overlayTagline').textContent = 'you hit a spike';
    document.getElementById('finalScore').style.display = 'block';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalScore').style.color = t.accent;

    document.getElementById('scoreBreakdown').style.display = 'block';
    document.getElementById('scoreBreakdown').textContent = `${spikesAvoided} spikes · ${coinsCollected} coins`;
    document.getElementById('scoreBreakdown').style.color = t.cardText;

    const statsEl = document.getElementById('statsPanel');
    statsEl.style.display = 'block';
    statsEl.innerHTML = `run ${formatDuration(runElapsedMs)}<br>spikes dodged ${spikesAvoided}<br>coins collected ${coinsCollected}<br>best run ${formatDuration(bestRunMs)}<br>best score ${bestScore}`;

    startBtnEl.style.display = 'none';
    document.getElementById('restartBtn').style.display = 'inline-block';
    document.getElementById('restartBtn').style.background = t.btn;
    document.getElementById('restartBtn').style.color = t.btnText;
    shareBtnEl.style.display = 'inline-block';
    shareBtnEl.style.borderColor = t.cardText;
    shareBtnEl.style.color = t.cardText;

    document.getElementById('hint').style.color = t.cardText;
    updateBestLabel();
    overlayEl.classList.remove('hidden');
    updatePauseButton();
  }, 600);
}

async function shareScore() {
  const text = `I scored ${score} in flip. Best ${bestScore}.`; 
  const statusEl = document.getElementById('shareStatus');
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      statusEl.textContent = 'copied to clipboard';
      return;
    }
  } catch (err) {
    // fallback handled below
  }

  const fallback = document.createElement('textarea');
  fallback.value = text;
  fallback.setAttribute('readonly', '');
  fallback.style.position = 'absolute';
  fallback.style.left = '-9999px';
  document.body.appendChild(fallback);
  fallback.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(fallback);
  statusEl.textContent = ok ? 'copied to clipboard' : `share text: ${text}`;
}

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;

  if (state === 'playing') {
    gameTime += 1;
    runElapsedMs += dt;
    if (shieldTimer > 0) {
      shieldTimer -= 1;
      if (shieldTimer <= 0) shieldActive = false;
    }
    if (slowMoTimer > 0) slowMoTimer -= 1;

    const newLevel = getLevel();
    if (newLevel !== lastLevel) {
      lastLevel = newLevel;
      level = newLevel;
      if (newLevel > 0) {
        currentTheme = { ...getInterpolatedTheme() };
        targetTheme = { ...themes[Math.min(newLevel, themes.length - 1)] };
        themeProgress = 0;
        const badge = document.getElementById('levelBadge');
        badge.textContent = levelNames[newLevel];
        badge.style.background = targetTheme.badge;
        badge.style.color = targetTheme.badgeText;
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 2000);
      }
    }

    if (themeProgress < 1) {
      themeProgress = Math.min(1, themeProgress + 0.008);
      if (themeProgress >= 1) currentTheme = { ...targetTheme };
    }

    if (gameTime - lastSpike > getSpawnInterval()) {
      spawnSpike();
      lastSpike = gameTime;
    }

    if (gameTime > 200 && gameTime >= nextCoinTime) {
      spawnCoin();
      nextCoinTime = gameTime + 280 + Math.floor(Math.random() * 340);
    }

    if (gameTime >= nextPowerupTime) {
      spawnPowerup();
      nextPowerupTime = gameTime + 1400 + Math.floor(Math.random() * 1200);
    }

    const spd = getSpeed();
    for (const obs of obstacles) {
      obs.x -= spd;
      if (!obs.scored && obs.x + obs.spikeW < W * 0.18 - PLAYER_SIZE) {
        obs.scored = true;
        spikesAvoided += 1;
        score += 1;
        updateUI();
        if (!firstDodgeHintShown) {
          firstDodgeHintShown = true;
          showContextHint('clean dodge +1');
        }
      }
    }
    obstacles = obstacles.filter(o => o.x > -80);

    for (const coin of coins) {
      coin.x -= spd * 0.9;
      const cy = getCoinY(coin, gameTime);
      coin._cy = cy;
      if (!coin.collected) {
        const px = W * 0.18;
        const py = player.y;
        const dist = Math.hypot(px - coin.x, py + PLAYER_SIZE / 2 - cy);
        if (dist < PLAYER_SIZE + 9) {
          coin.collected = true;
          coin.scaleTarget = 0;
          coinsCollected += 1;
          score += 3;
          updateUI();
          firstCoinCollected = true;
          playSfx('coin');
          floatTexts.push({ x: coin.x, y: cy, text: '+3', life: 1, vy: -1.5 });
          for (let i = 0; i < 12; i++) {
            const a = (i / 12) * Math.PI * 2;
            particles.push({ x: coin.x, y: cy, vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5, life: 1, size: 3, color: getThemeColor('fg') });
          }
        }
      }
    }
    coins = coins.filter(c => c.x > -40 && (!c.collected || c.scale > 0.01));

    for (const powerup of powerups) {
      powerup.x -= spd * 0.82;
      const py = getCoinY(powerup, gameTime);
      powerup._cy = py;
      if (!powerup.collected) {
        const dist = Math.hypot(W * 0.18 - powerup.x, player.y + PLAYER_SIZE / 2 - py);
        if (dist < PLAYER_SIZE + 11) {
          powerup.collected = true;
          powerup.scaleTarget = 0;
          if (powerup.type === 'shield') {
            shieldActive = true;
            shieldTimer = 420;
            showContextHint('shield active');
          } else {
            slowMoTimer = 230;
            showContextHint('slow motion');
          }
          playSfx('shield');
        }
      }
    }
    powerups = powerups.filter(p => p.x > -40 && (!p.collected || p.scale > 0.01));

    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life -= 0.04;
    }
    particles = particles.filter(p => p.life > 0);

    for (const f of floatTexts) {
      f.y += f.vy;
      f.life -= 0.025;
    }
    floatTexts = floatTexts.filter(f => f.life > 0);

    const hitObstacle = checkCollisions();
    if (hitObstacle) {
      if (shieldActive) {
        consumeShield(hitObstacle);
      } else {
        die();
      }
    }
  }

  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

function drawDebugOverlay() {
  const b = getPlayerBounds();
  ctx.save();
  ctx.strokeStyle = 'rgba(90, 200, 255, 0.9)';
  ctx.lineWidth = 1;
  ctx.strokeRect(b.left, b.top, b.right - b.left, b.bottom - b.top);

  ctx.strokeStyle = 'rgba(255, 100, 100, 0.85)';
  for (const obs of obstacles) {
    const x = obs.x - obs.spikeW / 2;
    const y = obs.side === 'top' ? midY - obs.spikeH : midY;
    ctx.strokeRect(x, y, obs.spikeW, obs.spikeH);
  }
  ctx.restore();
}

function draw() {
  const bgColor = getThemeColor('bg');
  const fgColor = getThemeColor('fg');
  const lineColor = getThemeColor('line');

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = lineColor;
  ctx.lineWidth = LINE_THICKNESS;
  ctx.beginPath();
  ctx.moveTo(0, midY);
  ctx.lineTo(W, midY);
  ctx.stroke();

  const freeze = state === 'paused';
  for (const coin of coins) drawCoin(coin, gameTime, freeze);
  for (const powerup of powerups) drawPowerup(powerup, gameTime, freeze);

  for (const obs of obstacles) {
    drawSpike(obs.x, obs.side, obs.spikeW, obs.spikeH, fgColor);
  }

  if (state === 'playing' || state === 'paused' || state === 'dead') drawPlayer(freeze);

  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  for (const f of floatTexts) {
    ctx.save();
    ctx.globalAlpha = f.life;
    ctx.fillStyle = fgColor;
    ctx.font = '500 13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }

  if (debugHitboxes) drawDebugOverlay();

  document.getElementById('logo').style.color = fgColor;
  document.getElementById('score').style.color = fgColor;
  document.getElementById('scoreLabel').style.color = fgColor;

  const controlBorder = state === 'paused' ? getThemeColor('accent') : fgColor;
  [pauseBtnEl, muteBtnEl, debugBtnEl].forEach(btn => {
    btn.style.borderColor = `${controlBorder}55`;
    btn.style.color = fgColor;
    btn.style.background = `${bgColor}b5`;
  });

  contextHintEl.style.background = `${getThemeColor('card')}ee`;
  contextHintEl.style.color = getThemeColor('cardText');
}

const restartBtn = document.createElement('button');
restartBtn.id = 'restartBtn';
restartBtn.textContent = 'play again';
restartBtn.style.cssText = 'padding:14px 36px;border-radius:100px;border:none;font-size:15px;font-weight:600;letter-spacing:0.3px;cursor:pointer;display:none;transition:transform 0.15s;';
restartBtn.addEventListener('click', startGame);
menuCardEl.insertBefore(restartBtn, document.getElementById('hint'));

startBtnEl.addEventListener('click', startGame);
pauseBtnEl.addEventListener('click', togglePause);
muteBtnEl.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem(STORAGE_KEYS.mutedSession, muted ? '1' : '0');
  updateMuteButton();
});
debugBtnEl.addEventListener('click', () => {
  debugHitboxes = !debugHitboxes;
  updateDebugButton();
});
shareBtnEl.addEventListener('click', shareScore);

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'playing') doFlip();
    return;
  }
  if (e.code === 'KeyP') {
    e.preventDefault();
    togglePause();
  }
});

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (state === 'playing') doFlip();
});

initGame();
draw();
animFrame = requestAnimationFrame(gameLoop);

overlayEl.style.background = 'rgba(255,255,255,0.92)';
menuCardEl.style.cssText += 'background:#f5f5f5;color:#111;';
startBtnEl.style.cssText += 'background:#111;color:#fff;';
updateMuteButton();
updatePauseButton();
updateDebugButton();
resetOverlayForRun();
</script>
</body>
